<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOland - Agentic UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="panel panel-narrativa" tabindex="1">
            <h2>🗺️ Protocolo de Ingreso</h2>
            <div id="auth-section" style="margin-bottom: 15px; text-align: center;">
                <a href="/auth/google/login" id="btn-google-login" style="display:inline-block; background:#ea4335; color:white; padding:10px 20px; border-radius:4px; text-decoration:none; font-weight:bold;">Entrar con Google</a>
                <div id="auth-status" style="margin-top: 10px; color: #10b981; display: none;"></div>
            </div>
            <div class="setup-form" id="setup-form" style="display: none;">
                <select id="nivel-previo" style="background:#0f172a; color:#f8fafc; border:1px solid #475569; padding:10px; border-radius:4px;">
                    <option value="Principiante">Principiante (0 experiencia en Go)</option>
                    <option value="Intermedio">Intermedio (Conozco la sintaxis básica)</option>
                    <option value="Experto">Experto (Quiero retos de concurrencia/arquitectura)</option>
                </select>
                <input type="text" id="dominio" placeholder="Ámbito (Ej. Medicina, Ciberseguridad...)" required>
                <input type="text" id="objetivo" placeholder="Objetivo (Ej. Analizar ADN, Crear Malware...)" required>
                <button id="btn-init">Inicializar Misión</button>
            </div>
            <div id="narrativa-output" class="content-area"></div>
        </div>

        <div class="panel panel-terminal" tabindex="2">
            <h2>📟 Terminal del Consejo</h2>
            <div id="terminal-logs" class="terminal-area">
                <div class="log-line system">Esperando credenciales de usuario...</div>
            </div>
        </div>

        <div class="panel panel-agentes" tabindex="3">
            <h2>👥 Consejo GOnion</h2>
            <div id="agentes-container" class="agentes-grid"></div>
        </div>

        <div class="panel panel-editor" tabindex="4">
            <h2>💻 Estación de Desarrollo</h2>
            <div id="instrucciones-nivel" style="margin-bottom: 10px; color: #38bdf8; font-size: 0.9rem;">
                Las instrucciones de tu GOnion asignado aparecerán aquí...
            </div>
            <textarea id="codigo-editor" placeholder="// Escribe tu código Go aquí..." style="width: 100%; height: 200px; background: #020617; color: #34d399; font-family: monospace; border: 1px solid #334155; padding: 10px;"></textarea>
            <button id="btn-evaluar" style="margin-top: 10px; background-color: #10b981;">Enviar a Evaluación</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
